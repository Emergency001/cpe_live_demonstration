<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced HTML</title>
</head>
<body>

    <h1><strong>Reg Number:</strong> 23:EG/CO/135</h1>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">Profile</a> |
        <a href="#">Contact</a>
    </nav>

    <header>
        <h1>Student Profile</h1>
    </header>

    <!-- Main content -->
    <article>
        <section>
            <!-- Local image file -->
            <img src="0aa963b906c74d91b3fe6e328831efe5.jpg" alt="Profile Picture" width="150">

            <!-- Expanded table -->
            <table border="1">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Major</th>
                </tr>
                <tr>
                    <td>John Doe</td>
                    <td>21</td>
                    <td>Computer Science</td>
                </tr>
                <tr>
                    <td>Jane Smith</td>
                    <td>22</td>
                    <td>Biology</td>
                </tr>
                <tr>
                    <td>Michael Lee</td>
                    <td>20</td>
                    <td>Engineering</td>
                </tr>
                <tr>
                    <td>Aisha Bello</td>
                    <td>23</td>
                    <td>Economics</td>
                </tr>
            </table>
        </section>
    </article>

    <!-- Form with new elements -->
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <!-- Radio buttons -->
        <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <!-- Checkbox -->
        <input type="checkbox" id="subscribe" name="subscribe">
        <label for="subscribe">Subscribe to newsletter</label><br><br>

        <!-- Textarea -->
        <label for="comments">Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Submit">
    </form>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Student Profile Page</p>
    </footer>

</body>
</html>
